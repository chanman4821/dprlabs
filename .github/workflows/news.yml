name: Refresh AI News

# Keeps /news/ fresh automatically. Runs hourly, discovers/collects from the
# credible source registry, and commits news/news.json ONLY when the stories
# actually change (so it deploys only on real updates, no churn).

on:
  schedule:
    - cron: "0 * * * *"      # top of every hour (UTC)
  workflow_dispatch: {}       # allow manual runs

permissions:
  contents: write

concurrency:
  group: news-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/news/requirements.txt

      - name: Scout for new sources (best-effort)
        run: python tools/news/scout.py || true

      - name: Collect + publish latest AI news
        run: python tools/news/agent.py

      - name: Commit & push if changed
        run: |
          git config user.name "dpr-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/news.json tools/news/sources.json
          if git diff --cached --quiet; then
            echo "No news changes — nothing to publish."
          else
            git commit -m "news: refresh AI feed ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
