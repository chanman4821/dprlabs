<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DPR — Rainbow Mesh Brain</title>
<style>
  html,body{margin:0;height:100%;background:#fff;display:grid;place-items:center;
            font-family:system-ui,-apple-system,sans-serif}
  .stage{position:relative;width:min(600px,92vw);aspect-ratio:1/1;display:grid;place-items:center}
  .glow{position:absolute;width:82%;height:82%;border-radius:50%;filter:blur(54px);opacity:.85;
    background:
      radial-gradient(closest-side at 40% 38%,rgba(99,102,241,.60),transparent 70%),
      radial-gradient(closest-side at 66% 34%,rgba(14,165,233,.55),transparent 70%),
      radial-gradient(closest-side at 62% 66%,rgba(16,185,129,.50),transparent 70%),
      radial-gradient(closest-side at 34% 64%,rgba(244,63,94,.50),transparent 70%),
      radial-gradient(closest-side at 50% 50%,rgba(168,85,247,.42),transparent 72%);
    animation:spin 20s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  canvas{position:relative;width:100%;height:100%}
  @media(prefers-reduced-motion:reduce){.glow{animation:none}}
</style>
</head>
<body>
<div class="stage"><div class="glow"></div><canvas id="c" aria-label="Rainbow mesh brain"></canvas></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1);
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
let W,H,path,nodes,edges,raf;

function resize(){const r=cv.getBoundingClientRect();W=cv.width=Math.round(r.width*DPR);H=cv.height=Math.round(r.height*DPR);}

function build(){
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.42, N=200, rx=0.92, ry=0.74;
  const out=[];
  for(let i=0;i<N;i++){
    const t=i/N*Math.PI*2, vert=-Math.sin(t), topF=Math.max(0,vert);
    const bump=(0.10*Math.sin(7*t+0.6)+0.05*Math.sin(4*t))*(0.35+0.8*topF);
    const rr=1+bump;
    const x=cx+R*rx*rr*Math.cos(t);
    let y=cy+R*ry*rr*Math.sin(t);
    if(vert<0) y+=R*0.05*(-vert);      // flatten the bottom
    out.push([x,y]);
  }
  path=new Path2D(); path.moveTo(out[0][0],out[0][1]);
  for(let i=1;i<out.length;i++) path.lineTo(out[i][0],out[i][1]);
  path.closePath();

  const minX=cx-R*rx*1.25,maxX=cx+R*rx*1.25,minY=cy-R*ry*1.35,maxY=cy+R*ry*1.35;
  const want=Math.round(Math.min(W,H)*0.085), spacing=(R*0.11)**2;
  nodes=[]; let tries=0;
  while(nodes.length<want && tries<9000){
    tries++;
    const x=minX+Math.random()*(maxX-minX), y=minY+Math.random()*(maxY-minY);
    if(!ctx.isPointInPath(path,x,y)) continue;
    let ok=true; for(const n of nodes){ if((n.bx-x)**2+(n.by-y)**2<spacing){ok=false;break;} }
    if(!ok) continue;
    nodes.push({bx:x,by:y,x,y,ph:Math.random()*6.283,amp:R*0.013*(0.5+Math.random()),
                hue:((x-(cx-R))/(2*R)*300+360)%360});
  }
  edges=[]; const seen=new Set();
  for(let i=0;i<nodes.length;i++){
    const d=[];
    for(let j=0;j<nodes.length;j++){ if(i!==j) d.push([(nodes[i].bx-nodes[j].bx)**2+(nodes[i].by-nodes[j].by)**2,j]); }
    d.sort((a,b)=>a[0]-b[0]);
    for(let k=0;k<3&&k<d.length;k++){ const j=d[k][1], a=Math.min(i,j), b=Math.max(i,j), key=a+'-'+b;
      if(!seen.has(key)){ seen.add(key); edges.push([a,b]); } }
  }
}

function draw(time){
  const t=time/1000;
  ctx.clearRect(0,0,W,H);
  for(const n of nodes){
    n.x = reduce ? n.bx : n.bx+Math.cos(t*0.8+n.ph)*n.amp;
    n.y = reduce ? n.by : n.by+Math.sin(t*0.7+n.ph*1.3)*n.amp;
  }
  // central fissure hint
  ctx.strokeStyle='rgba(20,20,30,.10)'; ctx.lineWidth=1.4*DPR;
  ctx.beginPath(); ctx.moveTo(W/2,H*0.16);
  ctx.bezierCurveTo(W*0.53,H*0.4,W*0.47,H*0.6,W/2,H*0.84); ctx.stroke();
  // edges
  ctx.lineWidth=1*DPR;
  for(const [i,j] of edges){
    const a=nodes[i], b=nodes[j];
    const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    g.addColorStop(0,`hsla(${a.hue},85%,60%,.45)`);
    g.addColorStop(1,`hsla(${b.hue},85%,60%,.45)`);
    ctx.strokeStyle=g; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  // nodes with travelling pulse
  for(const n of nodes){
    const pulse=reduce?0.5:0.5+0.5*Math.sin(t*2-(n.bx/W)*6.5);
    ctx.beginPath(); ctx.fillStyle=`hsl(${n.hue},85%,55%)`;
    ctx.shadowColor=`hsla(${n.hue},90%,60%,.9)`; ctx.shadowBlur=(3.5+6*pulse)*DPR;
    ctx.arc(n.x,n.y,(2.1+1.4*pulse)*DPR,0,6.283); ctx.fill();
  }
  ctx.shadowBlur=0;
  if(!reduce) raf=requestAnimationFrame(draw);
}

function start(){ resize(); build(); cancelAnimationFrame(raf); reduce?draw(0):requestAnimationFrame(draw); }
addEventListener('resize',start);
start();
</script>
</body>
</html>
