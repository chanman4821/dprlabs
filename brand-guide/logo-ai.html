<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap">
<style>
  :root{--gold:#c8912b;--goldb:#e9c46a;--blue:#3b5bdb;--ink:#0f1115;--line:#ececec;--muted:#8a8f98}
  *{box-sizing:border-box}
  body{font-family:'Geist',sans-serif;background:#fff;color:var(--ink);margin:0;padding:44px 40px}
  h1{font-size:22px;font-weight:700;letter-spacing:-.01em;margin:0 0 4px}
  .sub{font-family:'Geist Mono';font-size:12px;color:var(--muted);letter-spacing:.05em;margin:0 0 30px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:1180px}
  .tile{border:1px solid var(--line);border-radius:16px;padding:26px 24px;display:flex;flex-direction:column;gap:16px}
  .lockup{display:flex;align-items:center;gap:16px;min-height:70px}
  .wm{font-family:'Geist';font-weight:700;font-size:30px;letter-spacing:-.03em;line-height:1}
  .wm .ai{color:var(--blue);font-weight:500;margin-left:.12em}
  .foot{display:flex;align-items:center;gap:10px;margin-top:auto}
  .num{font-family:'Geist Mono';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)}
  .nm{font-family:'Geist Mono';font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:auto}
  svg{display:block;overflow:visible}
  .fav{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;padding:4px}
</style>
</head>
<body>
<h1>DPR&nbsp;AI — flat modern AI marks</h1>
<p class="sub">no 3d, no crests · flat vector like the modern AI brands · gold‑led (your Earth element) + blue spark</p>
<div class="grid">

  <!-- shared flat gradient -->
  <svg width="0" height="0"><defs>
    <linearGradient id="au" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e9c46a"/><stop offset="1" stop-color="#c8912b"/></linearGradient>
  </defs></svg>

  <!-- 1 SPARK -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <path d="M32 5 C33.6 23 41 30.4 59 32 C41 33.6 33.6 41 32 59 C30.4 41 23 33.6 5 32 C23 30.4 30.4 23 32 5 Z" fill="url(#au)"/>
        <path d="M50 9 C50.6 15 52 16.4 58 17 C52 17.6 50.6 19 50 25 C49.4 19 48 17.6 42 17 C48 16.4 49.4 15 50 9 Z" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A1</span><span class="nm">Spark</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><path d="M32 6 C33.6 23 41 30.4 58 32 C41 33.6 33.6 41 32 58 C30.4 41 23 33.6 6 32 C23 30.4 30.4 23 32 6 Z" fill="url(#au)"/></svg></span></div>
  </div>

  <!-- 2 BLOOM -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <g fill="url(#au)">
          <ellipse cx="32" cy="16" rx="5.4" ry="12"/>
          <ellipse cx="32" cy="16" rx="5.4" ry="12" transform="rotate(60 32 32)"/>
          <ellipse cx="32" cy="16" rx="5.4" ry="12" transform="rotate(120 32 32)"/>
          <ellipse cx="32" cy="16" rx="5.4" ry="12" transform="rotate(180 32 32)"/>
          <ellipse cx="32" cy="16" rx="5.4" ry="12" transform="rotate(240 32 32)"/>
          <ellipse cx="32" cy="16" rx="5.4" ry="12" transform="rotate(300 32 32)"/>
        </g>
        <circle cx="32" cy="32" r="6" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A2</span><span class="nm">Bloom</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><g fill="url(#au)"><ellipse cx="32" cy="15" rx="6" ry="13"/><ellipse cx="32" cy="15" rx="6" ry="13" transform="rotate(72 32 32)"/><ellipse cx="32" cy="15" rx="6" ry="13" transform="rotate(144 32 32)"/><ellipse cx="32" cy="15" rx="6" ry="13" transform="rotate(216 32 32)"/><ellipse cx="32" cy="15" rx="6" ry="13" transform="rotate(288 32 32)"/></g><circle cx="32" cy="32" r="6" fill="#3b5bdb"/></svg></span></div>
  </div>

  <!-- 3 ORBIT -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <ellipse cx="32" cy="32" rx="27" ry="11" fill="none" stroke="url(#au)" stroke-width="3.4" transform="rotate(-24 32 32)"/>
        <circle cx="32" cy="32" r="8" fill="url(#au)"/>
        <circle cx="53" cy="20.5" r="4.2" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A3</span><span class="nm">Orbit</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><ellipse cx="32" cy="32" rx="27" ry="11" fill="none" stroke="url(#au)" stroke-width="4.5" transform="rotate(-24 32 32)"/><circle cx="32" cy="32" r="9" fill="url(#au)"/></svg></span></div>
  </div>

  <!-- 4 SIGNAL -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <path d="M12 46 a28 28 0 0 1 40 0" fill="none" stroke="#e9c46a" stroke-width="3.6" stroke-linecap="round"/>
        <path d="M20 46 a19 19 0 0 1 24 0" fill="none" stroke="url(#au)" stroke-width="3.6" stroke-linecap="round"/>
        <path d="M27 46 a10 10 0 0 1 10 0" fill="none" stroke="#3b5bdb" stroke-width="3.6" stroke-linecap="round"/>
        <circle cx="32" cy="46" r="4" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A4</span><span class="nm">Signal</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><path d="M12 46 a28 28 0 0 1 40 0" fill="none" stroke="#e9c46a" stroke-width="4.5" stroke-linecap="round"/><path d="M20 46 a19 19 0 0 1 24 0" fill="none" stroke="url(#au)" stroke-width="4.5" stroke-linecap="round"/><circle cx="32" cy="46" r="5" fill="#3b5bdb"/></svg></span></div>
  </div>

  <!-- 5 KNOT -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64" fill="none">
        <rect x="12" y="18" width="28" height="28" rx="11" stroke="url(#au)" stroke-width="4"/>
        <rect x="24" y="18" width="28" height="28" rx="11" stroke="#3b5bdb" stroke-width="4"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A5</span><span class="nm">Knot</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64" fill="none"><rect x="12" y="18" width="28" height="28" rx="11" stroke="url(#au)" stroke-width="5"/><rect x="24" y="18" width="28" height="28" rx="11" stroke="#3b5bdb" stroke-width="5"/></svg></span></div>
  </div>

  <!-- 6 PULSE -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <polyline points="6,34 19,34 25,18 33,48 39,34 58,34" fill="none" stroke="url(#au)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="33" cy="48" r="4.2" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A6</span><span class="nm">Pulse</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><polyline points="6,34 19,34 25,18 33,48 39,34 58,34" fill="none" stroke="url(#au)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="33" cy="48" r="5" fill="#3b5bdb"/></svg></span></div>
  </div>

  <!-- 7 PRISM -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <path d="M12 14 L12 50 L40 32 Z" fill="url(#au)"/>
        <g stroke-width="4" stroke-linecap="round">
          <line x1="41" y1="25" x2="59" y2="20" stroke="#e9c46a"/>
          <line x1="43" y1="32" x2="61" y2="32" stroke="#c8912b"/>
          <line x1="41" y1="39" x2="59" y2="44" stroke="#3b5bdb"/>
        </g>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A7</span><span class="nm">Prism</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><path d="M14 14 L14 50 L42 32 Z" fill="url(#au)"/><line x1="44" y1="32" x2="60" y2="32" stroke="#3b5bdb" stroke-width="5" stroke-linecap="round"/></svg></span></div>
  </div>

  <!-- 8 MATRIX -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <g fill="#d9d5cc">
          <circle cx="18" cy="18" r="4"/><circle cx="32" cy="18" r="4"/><circle cx="46" cy="18" r="4"/>
          <circle cx="18" cy="32" r="4"/><circle cx="46" cy="32" r="4"/>
          <circle cx="18" cy="46" r="4"/><circle cx="32" cy="46" r="4"/><circle cx="46" cy="46" r="4"/>
        </g>
        <circle cx="32" cy="32" r="7" fill="url(#au)"/>
        <circle cx="46" cy="18" r="4" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A8</span><span class="nm">Matrix</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><g fill="#d9d5cc"><circle cx="18" cy="18" r="5"/><circle cx="46" cy="18" r="5"/><circle cx="18" cy="46" r="5"/><circle cx="46" cy="46" r="5"/></g><circle cx="32" cy="32" r="9" fill="url(#au)"/></svg></span></div>
  </div>

  <!-- 9 LENS -->
  <div class="tile">
    <div class="lockup">
      <svg width="58" height="58" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="24" fill="none" stroke="#e7e3da" stroke-width="4"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="url(#au)" stroke-width="4"/>
        <circle cx="32" cy="32" r="5" fill="#3b5bdb"/>
      </svg>
      <span class="wm">DPR <span class="ai">AI</span></span>
    </div>
    <div class="foot"><span class="num">A9</span><span class="nm">Lens</span>
      <span class="fav"><svg width="26" height="26" viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="none" stroke="#e7e3da" stroke-width="5"/><circle cx="32" cy="32" r="14" fill="none" stroke="url(#au)" stroke-width="5"/><circle cx="32" cy="32" r="6" fill="#3b5bdb"/></svg></span></div>
  </div>

</div>
</body>
</html>
